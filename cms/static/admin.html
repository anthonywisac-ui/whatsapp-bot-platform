<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Bot Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-200">

<div class="container mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6"><i class="fab fa-whatsapp text-green-500"></i> Admin Panel</h1>
    
    <!-- Create Bot Form -->
    <div class="bg-gray-800 rounded-xl p-6 mb-8">
        <h2 class="text-xl font-bold mb-4">Create New Bot</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="botName" placeholder="Bot Name (unique, lowercase)" class="bg-gray-700 px-4 py-2 rounded-lg">
            <select id="botType" class="bg-gray-700 px-4 py-2 rounded-lg">
                <option value="order">Order (Restaurant, Flowers, Cake)</option>
                <option value="appointment">Appointment (Salon, Gym, Real Estate)</option>
            </select>
            <input type="text" id="managerNumber" placeholder="Manager WhatsApp (with country code)" class="bg-gray-700 px-4 py-2 rounded-lg">
            <textarea id="menuJson" placeholder="Menu JSON" rows="3" class="bg-gray-700 px-4 py-2 rounded-lg font-mono text-sm"></textarea>
            <textarea id="stringsJson" placeholder="Strings JSON" rows="3" class="bg-gray-700 px-4 py-2 rounded-lg font-mono text-sm"></textarea>
        </div>
        <button onclick="createBot()" class="mt-4 bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-bold">Generate Bot</button>
        <div id="createStatus" class="mt-2 text-sm"></div>
    </div>

    <!-- Assign Bot to User -->
    <div class="bg-gray-800 rounded-xl p-6 mb-8">
        <h2 class="text-xl font-bold mb-4">Assign Bot to User</h2>
        <div class="flex gap-4">
            <input type="text" id="assignBotName" placeholder="Bot Name" class="bg-gray-700 px-4 py-2 rounded-lg flex-1">
            <input type="text" id="assignUsername" placeholder="Username" class="bg-gray-700 px-4 py-2 rounded-lg flex-1">
            <button onclick="assignBot()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-bold">Assign</button>
        </div>
        <div id="assignStatus" class="mt-2 text-sm"></div>
    </div>

    <!-- Bot List -->
    <div class="bg-gray-800 rounded-xl p-6">
        <h2 class="text-xl font-bold mb-4">All Bots</h2>
        <div id="botsList" class="space-y-2"></div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    let authToken = localStorage.getItem('admin_token');

    async function apiCall(endpoint, method, body = null) {
        const headers = { 'Content-Type': 'application/json' };
        if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function createBot() {
        const name = document.getElementById('botName').value.trim();
        const botType = document.getElementById('botType').value;
        const managerNumber = document.getElementById('managerNumber').value.trim();
        let menuJson = document.getElementById('menuJson').value.trim();
        let stringsJson = document.getElementById('stringsJson').value.trim();
        if (!menuJson) menuJson = '{"services":{"name":"Default","items":{"S1":{"name":"Service","price":10,"emoji":"⭐","desc":"Default"}}}}';
        if (!stringsJson) stringsJson = '{"en":{"welcome":"Welcome"}}';
        const config = { bot_name: name, bot_type: botType, manager_number: managerNumber, menu: JSON.parse(menuJson), strings: JSON.parse(stringsJson) };
        try {
            await apiCall('/cms/bots', 'POST', { name, bot_type: botType, config_json: config });
            document.getElementById('createStatus').innerHTML = '<span class="text-green-400">Bot created!</span>';
            loadBots();
        } catch(e) { document.getElementById('createStatus').innerHTML = '<span class="text-red-400">Error: '+e.message+'</span>'; }
    }

    async function assignBot() {
        const botName = document.getElementById('assignBotName').value.trim();
        const username = document.getElementById('assignUsername').value.trim();
        try {
            await apiCall('/cms/assign-bot', 'POST', { bot_name: botName, username });
            document.getElementById('assignStatus').innerHTML = '<span class="text-green-400">Assigned!</span>';
        } catch(e) { document.getElementById('assignStatus').innerHTML = '<span class="text-red-400">Error: '+e.message+'</span>'; }
    }

    async function loadBots() {
        const bots = await apiCall('/cms/bots', 'GET');
        const container = document.getElementById('botsList');
        container.innerHTML = bots.map(b => `<div class="bg-gray-700 p-3 rounded-lg flex justify-between items-center">
            <div><span class="font-bold">${b.name}</span> <span class="text-gray-400 text-sm">(${b.type})</span></div>
            <button onclick="deleteBot('${b.name}')" class="text-red-400 hover:text-red-300">Delete</button>
        </div>`).join('');
    }

    async function deleteBot(name) {
        if (!confirm('Delete bot?')) return;
        await apiCall(`/cms/bots/${name}`, 'DELETE');
        loadBots();
    }

    // Login first
    async function login() {
        const pwd = prompt('Admin password:');
        if (!pwd) return;
        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'admin', password: pwd })
            });
            const data = await res.json();
            authToken = data.access_token;
            localStorage.setItem('admin_token', authToken);
            loadBots();
        } catch(e) { alert('Login failed'); }
    }

    if (!authToken) login();
    else loadBots();
</script>
</body>
</html>
