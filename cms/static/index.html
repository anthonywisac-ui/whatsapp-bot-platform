<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot CMS</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f3f4f6; }
        .transition-all { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Login Screen (hidden when logged in) -->
    <div id="loginContainer" class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <div class="text-center mb-6">
                <i class="fab fa-whatsapp text-5xl text-green-500"></i>
                <h2 class="text-2xl font-bold mt-2">Bot CMS Login</h2>
                <p class="text-gray-500">Enter your admin credentials</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700">Username</label>
                    <input type="text" id="loginUsername" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="admin">
                </div>
                <div>
                    <label class="block text-gray-700">Password</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="••••••">
                </div>
                <button onclick="login()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition-all">
                    <i class="fas fa-sign-in-alt mr-2"></i> Login
                </button>
            </div>
            <div id="loginError" class="mt-4 text-red-500 text-center text-sm hidden"></div>
        </div>
    </div>

    <!-- Main Dashboard (hidden until login) -->
    <div id="dashboardContainer" class="hidden">
        <!-- Top Navbar -->
        <nav class="bg-white shadow-md sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-3">
                        <i class="fab fa-whatsapp text-2xl text-green-500"></i>
                        <span class="font-bold text-xl text-gray-800">WhatsApp Bot Manager</span>
                        <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full">v2.0</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="adminUser" class="text-gray-600"><i class="fas fa-user-circle mr-1"></i> Admin</span>
                        <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow p-6 card-hover transition-all">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Bots</p>
                            <p id="statTotalBots" class="text-3xl font-bold">0</p>
                        </div>
                        <i class="fas fa-robot text-4xl text-blue-400"></i>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Active Orders Today</p>
                            <p id="statActiveOrders" class="text-3xl font-bold">0</p>
                        </div>
                        <i class="fas fa-shopping-cart text-4xl text-green-400"></i>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Revenue (Today)</p>
                            <p id="statRevenue" class="text-3xl font-bold">$0</p>
                        </div>
                        <i class="fas fa-dollar-sign text-4xl text-yellow-400"></i>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">System Uptime</p>
                            <p id="statUptime" class="text-3xl font-bold">-</p>
                        </div>
                        <i class="fas fa-clock text-4xl text-purple-400"></i>
                    </div>
                </div>
            </div>

            <!-- Two columns: Bot List + Create Form -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left: Bot List -->
                <div class="lg:col-span-2 bg-white rounded-xl shadow p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold"><i class="fas fa-list mr-2 text-green-500"></i> Your Bots</h2>
                        <button onclick="fetchBots()" class="text-blue-500 hover:text-blue-700 text-sm"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                    </div>
                    <div id="botsList" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                        <!-- dynamic bot cards appear here -->
                        <div class="text-center text-gray-400 py-8">Loading bots...</div>
                    </div>
                </div>

                <!-- Right: Create New Bot -->
                <div class="bg-white rounded-xl shadow p-6">
                    <h2 class="text-xl font-bold mb-4"><i class="fas fa-plus-circle mr-2 text-green-500"></i> Create New Bot</h2>
                    <form id="createBotForm" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 text-sm">Bot Name (unique, lowercase, no spaces)</label>
                            <input type="text" id="newBotName" class="w-full px-3 py-2 border rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="e.g., hair_salon" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm">Bot Type</label>
                            <select id="newBotType" class="w-full px-3 py-2 border rounded-lg">
                                <option value="order">Order (Restaurant, Flowers, Cake)</option>
                                <option value="appointment">Appointment (Salon, Gym, Real Estate)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm">Manager WhatsApp Number (with country code)</label>
                            <input type="text" id="newManagerNumber" class="w-full px-3 py-2 border rounded-lg" placeholder="923001234567">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm">Menu JSON (or leave default)</label>
                            <textarea id="newMenuJson" rows="4" class="w-full px-3 py-2 border rounded-lg font-mono text-sm" placeholder='{"category": {"name": "Services", "items": {"ID1": {"name": "Service 1", "price": 10, "emoji": "🔥", "desc": "Description"}}}}'></textarea>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm">Strings JSON (translations)</label>
                            <textarea id="newStringsJson" rows="3" class="w-full px-3 py-2 border rounded-lg font-mono text-sm" placeholder='{"en": {"welcome": "Welcome!"}}'></textarea>
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition-all">
                            <i class="fas fa-rocket mr-2"></i> Generate Bot
                        </button>
                    </form>
                    <div id="createStatus" class="mt-4 text-sm text-center"></div>
                </div>
            </div>

            <!-- Performance / Logs Section -->
            <div class="mt-8 bg-white rounded-xl shadow p-6">
                <h2 class="text-xl font-bold mb-3"><i class="fas fa-chart-line mr-2 text-green-500"></i> Recent Activity & Performance</h2>
                <div class="border rounded-lg overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Time</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Bot</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Event</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Details</th>
                            </tr>
                        </thead>
                        <tbody id="activityLogs" class="divide-y divide-gray-200">
                            <tr><td colspan="4" class="px-6 py-4 text-center text-gray-400">No recent activity</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API base URL – change if your FastAPI runs on different port
        const API_BASE = window.location.origin;  // same origin as dashboard
        let authToken = null;

        // ---------- Helper Functions ----------
        async function apiCall(endpoint, method, body = null, auth = true) {
            const headers = { 'Content-Type': 'application/json' };
            if (auth && authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Request failed');
            }
            return res.json();
        }

        // Login
        window.login = async function() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            try {
                const data = await apiCall('/cms/login', 'POST', { username, password }, false);
                authToken = data.access_token;
                localStorage.setItem('cms_token', authToken);
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                loadDashboard();
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
            }
        }

        window.logout = function() {
            authToken = null;
            localStorage.removeItem('cms_token');
            document.getElementById('dashboardContainer').classList.add('hidden');
            document.getElementById('loginContainer').classList.remove('hidden');
        }

        // Load dashboard data
        async function loadDashboard() {
            await fetchBots();
            await fetchStats();
            await fetchActivityLogs();
        }

        async function fetchBots() {
            try {
                const bots = await apiCall('/cms/bots', 'GET');
                const container = document.getElementById('botsList');
                if (bots.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-8">No bots created yet. Use the form to create one.</div>';
                    return;
                }
                container.innerHTML = bots.map(bot => `
                    <div class="border rounded-lg p-4 flex justify-between items-center hover:bg-gray-50 transition">
                        <div>
                            <div class="font-bold text-lg">${bot.name}</div>
                            <div class="text-sm text-gray-500">Type: ${bot.type} | Created: ${new Date(bot.created).toLocaleString()}</div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="viewBotDetails('${bot.name}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-eye"></i></button>
                            <button onclick="deleteBot('${bot.name}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('botsList').innerHTML = `<div class="text-red-500">Error loading bots: ${err.message}</div>`;
            }
        }

        async function fetchStats() {
            // You can extend your CMS API to return stats from DB or saved_orders
            // For now, we simulate or fetch from a stats endpoint if you create one.
            try {
                // Placeholder – you can create /cms/stats endpoint in routes.py
                // For demo, we just show dummy data
                document.getElementById('statTotalBots').innerText = (await apiCall('/cms/bots', 'GET')).length;
                document.getElementById('statActiveOrders').innerText = '0'; // implement later
                document.getElementById('statRevenue').innerText = '$0';
                document.getElementById('statUptime').innerText = '2h 15m';
            } catch(e) { console.warn(e); }
        }

        async function fetchActivityLogs() {
            // You can implement a log endpoint; for now placeholder
            const tbody = document.getElementById('activityLogs');
            tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-gray-400">Demo logs – connect your own logging system</td></tr>`;
        }

        window.viewBotDetails = function(botName) {
            alert(`View details for ${botName} – you can implement a modal showing config, orders, etc.`);
        }

        window.deleteBot = async function(botName) {
            if (!confirm(`Delete bot "${botName}" permanently?`)) return;
            try {
                await apiCall(`/cms/bots/${botName}`, 'DELETE');
                await fetchBots();
                showStatus('createStatus', `Bot ${botName} deleted`, 'green');
            } catch (err) {
                showStatus('createStatus', `Error: ${err.message}`, 'red');
            }
        }

        // Create bot form submit
        document.getElementById('createBotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('newBotName').value.trim();
            const botType = document.getElementById('newBotType').value;
            const managerNumber = document.getElementById('newManagerNumber').value.trim();
            let menuJson = document.getElementById('newMenuJson').value.trim();
            let stringsJson = document.getElementById('newStringsJson').value.trim();

            // Default menu if empty
            if (!menuJson) {
                menuJson = JSON.stringify({
                    "services": {
                        "name": "Main Services",
                        "items": {
                            "SRV1": { "name": "Basic Service", "price": 25, "emoji": "⭐", "desc": "Standard service" }
                        }
                    }
                });
            }
            if (!stringsJson) {
                stringsJson = JSON.stringify({
                    "en": { "welcome": "Welcome to our bot!", "greeting_welcome": "Hello! How can I help?" }
                });
            }

            const config = {
                bot_name: name,
                bot_type: botType,
                manager_number: managerNumber,
                menu: JSON.parse(menuJson),
                strings: JSON.parse(stringsJson)
            };

            try {
                await apiCall('/cms/bots', 'POST', {
                    name: name,
                    bot_type: botType,
                    config_json: config
                });
                showStatus('createStatus', `Bot "${name}" created successfully!`, 'green');
                document.getElementById('createBotForm').reset();
                await fetchBots();
            } catch (err) {
                showStatus('createStatus', `Creation failed: ${err.message}`, 'red');
            }
        });

        function showStatus(elementId, message, color) {
            const div = document.getElementById(elementId);
            div.innerHTML = `<span class="text-${color}-500">${message}</span>`;
            setTimeout(() => { div.innerHTML = ''; }, 5000);
        }

        // Auto-login if token exists in localStorage
        const savedToken = localStorage.getItem('cms_token');
        if (savedToken) {
            authToken = savedToken;
            // Verify token by trying to fetch bots
            apiCall('/cms/bots', 'GET').then(() => {
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                loadDashboard();
            }).catch(() => {
                localStorage.removeItem('cms_token');
                authToken = null;
            });
        }
    </script>
</body>
</html>
