<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-200">

<!-- LOGIN / REGISTER CONTAINER -->
<div id="authContainer" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-6">
            <i class="fab fa-whatsapp text-5xl text-green-500"></i>
            <h2 class="text-2xl font-bold mt-2">Bot Manager</h2>
        </div>
        <div class="mb-4">
            <div class="flex border-b border-gray-700">
                <button id="loginTabBtn" class="flex-1 py-2 text-center font-semibold text-green-400 border-b-2 border-green-400">Login</button>
                <button id="registerTabBtn" class="flex-1 py-2 text-center font-semibold text-gray-400">Register</button>
            </div>
        </div>
        <!-- Login Form -->
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" class="w-full mb-3 px-4 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            <input type="password" id="loginPassword" placeholder="Password" class="w-full mb-4 px-4 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            <button onclick="login()" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded-lg font-bold">Login</button>
            <div id="loginError" class="text-red-400 text-sm mt-2 text-center"></div>
        </div>
        <!-- Register Form (hidden initially) -->
        <div id="registerForm" class="hidden">
            <input type="text" id="regUsername" placeholder="Username" class="w-full mb-3 px-4 py-2 bg-gray-700 rounded-lg">
            <input type="password" id="regPassword" placeholder="Password" class="w-full mb-4 px-4 py-2 bg-gray-700 rounded-lg">
            <button onclick="register()" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg font-bold">Register</button>
            <div id="registerError" class="text-red-400 text-sm mt-2 text-center"></div>
        </div>
    </div>
</div>

<!-- MAIN DASHBOARD (hidden until login) -->
<div id="dashboardContainer" class="hidden">
    <nav class="bg-gray-800 shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fab fa-whatsapp text-2xl text-green-500"></i>
            <span class="font-bold text-xl">Bot Manager</span>
        </div>
        <div class="flex items-center space-x-4">
            <span id="userNameDisplay" class="text-gray-300"></span>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-gray-800 rounded-xl p-5 shadow">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-400 text-sm">Total Orders (Today)</p>
                        <p id="statOrders" class="text-3xl font-bold text-green-400">0</p>
                    </div>
                    <i class="fas fa-shopping-cart text-3xl text-gray-500"></i>
                </div>
            </div>
            <div class="bg-gray-800 rounded-xl p-5 shadow">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-400 text-sm">Revenue (Today)</p>
                        <p id="statRevenue" class="text-3xl font-bold text-green-400">$0</p>
                    </div>
                    <i class="fas fa-dollar-sign text-3xl text-gray-500"></i>
                </div>
            </div>
            <div class="bg-gray-800 rounded-xl p-5 shadow">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-400 text-sm">Total Calls</p>
                        <p id="statCalls" class="text-3xl font-bold text-blue-400">0</p>
                    </div>
                    <i class="fas fa-phone text-3xl text-gray-500"></i>
                </div>
            </div>
            <div class="bg-gray-800 rounded-xl p-5 shadow">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-gray-400 text-sm">Appointments</p>
                        <p id="statAppointments" class="text-3xl font-bold text-yellow-400">0</p>
                    </div>
                    <i class="fas fa-calendar-check text-3xl text-gray-500"></i>
                </div>
            </div>
        </div>

        <!-- Bot Selection & Details -->
        <div class="bg-gray-800 rounded-xl shadow p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Your Bots</h2>
            <div class="flex flex-wrap gap-3 mb-4" id="botsList">
                <div class="text-gray-400">Loading bots...</div>
            </div>
            <div id="selectedBotInfo" class="mt-4 p-4 bg-gray-700 rounded-lg hidden">
                <h3 class="font-bold text-lg" id="selectedBotName"></h3>
                <div class="grid grid-cols-2 gap-4 mt-3 text-sm">
                    <div>Type: <span id="botType"></span></div>
                    <div>Created: <span id="botCreated"></span></div>
                    <div>API Key: <code id="botApiKey" class="bg-gray-900 px-2 py-1 rounded"></code></div>
                </div>
            </div>
        </div>

        <!-- Analytics Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-gray-800 rounded-xl shadow p-5">
                <h3 class="font-semibold mb-3">Orders Last 7 Days</h3>
                <canvas id="ordersChart" height="200"></canvas>
            </div>
            <div class="bg-gray-800 rounded-xl shadow p-5">
                <h3 class="font-semibold mb-3">Revenue Last 7 Days</h3>
                <canvas id="revenueChart" height="200"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    let authToken = null;
    let currentUser = null;
    let ordersChart, revenueChart;

    // Helper API call
    async function apiCall(endpoint, method, body = null, auth = true) {
        const headers = { 'Content-Type': 'application/json' };
        if (auth && authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Request failed');
        }
        return res.json();
    }

    // Auth
    window.login = async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        try {
            const data = await apiCall('/auth/login', 'POST', { username, password }, false);
            authToken = data.access_token;
            localStorage.setItem('token', authToken);
            await loadDashboard();
        } catch(err) {
            document.getElementById('loginError').innerText = err.message;
        }
    };

    window.register = async () => {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        try {
            await apiCall('/auth/register', 'POST', { username, password }, false);
            // auto login after register
            const data = await apiCall('/auth/login', 'POST', { username, password }, false);
            authToken = data.access_token;
            localStorage.setItem('token', authToken);
            await loadDashboard();
        } catch(err) {
            document.getElementById('registerError').innerText = err.message;
        }
    };

    window.logout = () => {
        authToken = null;
        localStorage.removeItem('token');
        document.getElementById('dashboardContainer').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    };

    async function loadDashboard() {
        // Get user info
        const user = await apiCall('/auth/me', 'GET');
        currentUser = user;
        document.getElementById('userNameDisplay').innerText = user.username;
        document.getElementById('dashboardContainer').classList.remove('hidden');
        document.getElementById('authContainer').classList.add('hidden');

        // Load user's bots
        await loadBots();
        // Load stats & charts
        await loadStats();
        await loadCharts();
    }

    async function loadBots() {
        const bots = await apiCall('/cms/bots', 'GET');
        const container = document.getElementById('botsList');
        if (!bots.length) {
            container.innerHTML = '<div class="text-gray-400">No bots assigned. Contact admin.</div>';
            return;
        }
        container.innerHTML = bots.map(bot => `
            <button onclick="selectBot('${bot.name}')" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition">
                ${bot.name} <span class="text-xs text-gray-400">(${bot.type})</span>
            </button>
        `).join('');
        if (bots.length) selectBot(bots[0].name);
    }

    window.selectBot = async (botName) => {
        document.getElementById('selectedBotInfo').classList.remove('hidden');
        document.getElementById('selectedBotName').innerText = botName;
        // Fetch bot details (you need to add endpoint /cms/bots/{name}/details)
        try {
            const details = await apiCall(`/cms/bots/${botName}/details`, 'GET');
            document.getElementById('botType').innerText = details.type;
            document.getElementById('botCreated').innerText = new Date(details.created).toLocaleString();
            document.getElementById('botApiKey').innerText = details.api_key || 'Not set';
        } catch(e) { console.error(e); }
        // Load bot-specific analytics
        await loadBotAnalytics(botName);
    };

    async function loadStats() {
        const stats = await apiCall('/api/stats', 'GET');
        document.getElementById('statOrders').innerText = stats.orders_today || 0;
        document.getElementById('statRevenue').innerText = `$${stats.revenue_today || 0}`;
        document.getElementById('statCalls').innerText = stats.calls_today || 0;
        document.getElementById('statAppointments').innerText = stats.appointments_today || 0;
    }

    async function loadCharts() {
        const data = await apiCall('/api/analytics/weekly', 'GET');
        if (ordersChart) ordersChart.destroy();
        if (revenueChart) revenueChart.destroy();
        const ctxOrders = document.getElementById('ordersChart').getContext('2d');
        const ctxRevenue = document.getElementById('revenueChart').getContext('2d');
        ordersChart = new Chart(ctxOrders, {
            type: 'line',
            data: { labels: data.dates, datasets: [{ label: 'Orders', data: data.orders, borderColor: '#22c55e', tension: 0.3 }] }
        });
        revenueChart = new Chart(ctxRevenue, {
            type: 'line',
            data: { labels: data.dates, datasets: [{ label: 'Revenue ($)', data: data.revenue, borderColor: '#eab308', tension: 0.3 }] }
        });
    }

    async function loadBotAnalytics(botName) {
        // You can implement per-bot analytics display
        console.log('Load analytics for', botName);
    }

    // Tab switching
    document.getElementById('loginTabBtn').addEventListener('click', () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginTabBtn').classList.add('border-green-400', 'text-green-400');
        document.getElementById('registerTabBtn').classList.remove('border-green-400', 'text-green-400');
        document.getElementById('registerTabBtn').classList.add('text-gray-400');
    });
    document.getElementById('registerTabBtn').addEventListener('click', () => {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerTabBtn').classList.add('border-green-400', 'text-green-400');
        document.getElementById('loginTabBtn').classList.remove('border-green-400', 'text-green-400');
        document.getElementById('loginTabBtn').classList.add('text-gray-400');
    });

    // Auto login if token exists
    const savedToken = localStorage.getItem('token');
    if (savedToken) {
        authToken = savedToken;
        apiCall('/auth/me', 'GET').then(() => loadDashboard()).catch(() => { localStorage.removeItem('token'); authToken = null; });
    }
</script>
</body>
</html>
